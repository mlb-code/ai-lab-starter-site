<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">

  <title>כניסה לאזור האישי — AI Lab Starter</title>
  <meta name="description" content="כניסה לאזור האישי של סטודנטים בקורס Starter — AI Lab.">
  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="icon" href="./favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css">

  <style>
    /* ===== Login page-specific ===== */
    body.login-body {
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px 16px;
      position: relative;
      overflow: hidden;
    }

    .login-bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, #000 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, #000 30%, transparent 80%);
      opacity: 0.4;
      pointer-events: none;
    }
    .login-bg-blob {
      position: fixed;
      width: 540px; height: 540px;
      border-radius: 50%;
      filter: blur(110px);
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }
    .login-bg-blob--a {
      top: -160px; right: -160px;
      background: radial-gradient(circle, rgba(16,229,147,0.4), transparent 70%);
    }
    .login-bg-blob--b {
      bottom: -160px; left: -160px;
      background: radial-gradient(circle, rgba(108,60,225,0.35), transparent 70%);
    }

    .login-back {
      position: absolute;
      top: 24px;
      right: 24px;
      z-index: 5;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      color: var(--ink-300);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(10,10,10,0.6);
      backdrop-filter: blur(8px);
      transition: color 0.15s, border-color 0.15s;
    }
    .login-back:hover { color: var(--ink-100); border-color: var(--brand); }

    .login-card {
      position: relative;
      z-index: 2;
      width: min(440px, 100%);
      background: linear-gradient(180deg, var(--bg-elev), var(--bg-card));
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 40px 32px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 50px rgba(16,229,147,0.08);
    }

    .login-logo {
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 28px;
      direction: ltr;
    }
    .login-logo-text {
      font-weight: 900;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      color: var(--ink-100);
    }
    .login-logo-tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--brand);
      border: 1px solid var(--brand);
      padding: 3px 7px;
      border-radius: 2px;
      letter-spacing: 0.2em;
      line-height: 1;
    }

    .login-kicker {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--brand);
      margin-bottom: 10px;
      display: block;
    }
    .login-title {
      font-size: 1.9rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--ink-100);
      margin-bottom: 8px;
    }
    .login-title em { color: var(--brand); }
    .login-sub {
      color: var(--ink-500);
      font-size: 0.95rem;
      line-height: 1.55;
      margin-bottom: 28px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .login-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .login-field label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--ink-500);
    }
    .login-field input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      color: var(--ink-100);
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.15s, box-shadow 0.15s;
      direction: ltr;
      text-align: right;
    }
    .login-field input::placeholder { color: var(--ink-700); }
    .login-field input:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(16,229,147,0.15);
    }
    .login-hint {
      font-size: 0.78rem;
      color: var(--ink-700);
      line-height: 1.4;
      margin-top: 2px;
    }

    .login-submit {
      margin-top: 12px;
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--brand), var(--brand-glow));
      color: #000;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(16,229,147,0.3);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .login-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(16,229,147,0.45);
    }
    .login-submit:disabled {
      opacity: 0.6;
      cursor: wait;
      transform: none;
    }

    .login-error {
      display: none;
      padding: 12px 14px;
      background: rgba(255,138,76,0.08);
      border: 1px solid rgba(255,138,76,0.35);
      border-radius: 6px;
      color: var(--warn);
      font-size: 0.88rem;
      line-height: 1.45;
    }
    .login-error.show { display: block; }

    .login-foot {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px dashed var(--line);
      font-size: 0.85rem;
      color: var(--ink-500);
      line-height: 1.55;
    }
    .login-foot a {
      color: var(--brand);
      text-decoration: none;
      font-weight: 600;
    }
    .login-foot a:hover { text-decoration: underline; }

    .login-mono-tag {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 0.66rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--ink-700);
      margin-top: 24px;
    }

    @media (max-width: 480px) {
      .login-card { padding: 32px 22px; }
      .login-title { font-size: 1.55rem; }
      .login-back { top: 16px; right: 16px; padding: 6px 12px; font-size: 0.8rem; }
    }
  </style>
</head>
<body class="login-body">

  <div class="login-bg-grid"></div>
  <div class="login-bg-blob login-bg-blob--a"></div>
  <div class="login-bg-blob login-bg-blob--b"></div>

  <a href="./index.html" class="login-back">← חזרה לאתר</a>

  <div class="login-card">
    <div class="login-logo">
      <span class="login-logo-text">AI Lab</span>
      <span class="login-logo-tag">STARTER</span>
    </div>

    <span class="login-kicker">— האזור האישי</span>
    <h1 class="login-title">ברוכים הבאים <em>חזרה.</em></h1>
    <p class="login-sub">
      התחבר עם האימייל שמסרת בהרשמה.
    </p>

    <form class="login-form" id="loginForm" autocomplete="on">
      <div class="login-field">
        <label for="email">אימייל</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="your@email.com"
          autocomplete="email"
          required
          dir="ltr"
        >
      </div>

      <div class="login-field" id="passwordField" style="display:none;">
        <label for="password">סיסמת אדמין</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          dir="ltr"
        >
        <div class="login-hint">מזוהה כחשבון אדמין — נדרשת סיסמה.</div>
      </div>

      <div class="login-error" id="loginError"></div>

      <button type="submit" class="login-submit" id="loginSubmit">
        <span id="loginSubmitText">כניסה לאזור האישי</span>
        <span id="loginSubmitArrow">←</span>
      </button>
    </form>

    <div class="login-foot">
      לא נרשמתם עדיין? <a href="./index.html#register">השאירו פרטים כאן</a>
      <br>נתקלתם בבעיה? <a href="https://wa.me/972546500795" target="_blank">פנו אלינו ב-WhatsApp</a>
    </div>

    <div class="login-mono-tag">AI LAB · STARTER · v1.0</div>
  </div>

  <script>
    (function() {
      // ⚠️ PASTE the Apps Script Web App URL here after deploying
      const AUTH_URL = 'https://script.google.com/macros/s/AKfycbz-J5Zz-zLKSe2Ez_SCAkH-jxvKdH8X1Ry2yQLMe5I_la-Vwc7iHX90NDUWZ9bPgLRo/exec';
      const PORTAL_URL = 'https://mlb-code.github.io/ai-lab-starter/';

      const form = document.getElementById('loginForm');
      const errBox = document.getElementById('loginError');
      const submitBtn = document.getElementById('loginSubmit');
      const submitText = document.getElementById('loginSubmitText');
      const passwordField = document.getElementById('passwordField');
      const passwordInput = document.getElementById('password');

      async function authenticate(email, password) {
        try {
          const body = new URLSearchParams();
          body.append('email', email);
          body.append('password', password || '');
          const res = await fetch(AUTH_URL, { method: 'POST', body });
          return await res.json();
        } catch (err) {
          return { ok: false, error: 'בעיית חיבור. נסה שוב.' };
        }
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errBox.classList.remove('show');

        const email = form.email.value.trim();
        const password = passwordInput.value.trim();

        submitBtn.disabled = true;
        submitText.textContent = 'מתחבר…';

        const res = await authenticate(email, password);

        if (res.ok) {
          try {
            localStorage.setItem('ai_lab_user', JSON.stringify(res.user));
          } catch {}
          submitText.textContent = 'מעביר אותך לאזור האישי…';
          setTimeout(() => { window.location.href = PORTAL_URL; }, 500);
          return;
        }

        if (res.requirePassword) {
          passwordField.style.display = '';
          passwordInput.focus();
          if (res.error) {
            errBox.textContent = res.error;
            errBox.classList.add('show');
          }
        } else {
          errBox.textContent = res.error || 'אימייל לא נמצא במערכת.';
          errBox.classList.add('show');
        }

        submitBtn.disabled = false;
        submitText.textContent = 'כניסה לאזור האישי';
      });
    })();
  </script>

</body>
</html>
